<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Controle rígido de cache (prevenir problema do F5) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <title>RouteVoy - Cupons e Ofertas Geolocalizadas</title>
    <meta name="description" content="Encontre os melhores cupons e promoções com geolocalização no RouteVoy." />
    <meta name="author" content="RouteVoy" />
    
    <!-- Open Graph Meta Tags (Para o WhatsApp/Facebook funcionarem sem JS) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://routevoy.com/" />
    <meta property="og:title" content="RouteVoy - Cupons e Ofertas Geolocalizadas" />
    <meta property="og:description" content="Encontre os melhores cupons e promoções com geolocalização no RouteVoy." />
    <!-- Usando a URL absoluta para garantir leitura no WhatsApp -->
    <meta property="og:image" content="https://routevoy.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="RouteVoy" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://routevoy.com/" />
    <meta name="twitter:title" content="RouteVoy - Cupons e Ofertas Geolocalizadas" />
    <meta name="twitter:description" content="Encontre os melhores cupons e promoções com geolocalização no RouteVoy." />
    <meta name="twitter:image" content="https://routevoy.com/og-image.png" />

    <!-- PWA & Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>

  <body>
    <div id="root"></div>
    <script src="https://goskip.dev/skip.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
